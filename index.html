<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NASA Space Explorer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="nasa-header">
    <img src="nasa-logo.png" alt="NASA Logo" class="nasa-logo">
    <h1>Space Explorer App</h1>
  </header>

  <div class="fact-banner">
    <p id="fact-text">Loading a fascinating space fact...</p>
  </div>

  <main class="app-container">
    <section class="controls">
      <h2>Astronomy Picture of the Day Gallery</h2>
      <p>Select a date range to begin your cosmic journey (June 16, 1995 to today):</p>
      
      <div class="date-inputs">
        <div class="input-group">
          <label for="start-date">Start Date</label>
          <input type="date" id="start-date" name="start-date">
        </div>
        <div class="input-group">
          <label for="end-date">End Date</label>
          <input type="date" id="end-date" name="end-date">
        </div>
        <button id="get-images-btn">Get Space Images</button>
      </div>
    </section>

    <div id="loading-message" class="loading-spinner" style="display: none;">
      <p>Loading space photos...</p>
    </div>

    <div id="gallery" class="gallery-grid"></div>
  </main>

  <div id="space-modal" class="modal">
    <div class="modal-content">
      <span id="close-modal-btn" class="close-btn">&times;</span>
      <div id="modal-media-container"></div>
      <div class="modal-info">
        <h2 id="modal-title"></h2>
        <p id="modal-date" class="modal-date-text"></p>
        <p id="modal-explanation"></p>
      </div>
    </div>
  </div>

  <script src="dateRange.js"></script>
  <script src="script.js"></script>
</body>
</html>
